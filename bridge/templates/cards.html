{% set status_labels = {"ok": "Online", "warn": "Warning", "bad": "Offline", "unknown": "Unknown"} %}
{% for card in cards %}
<div class="card bg-base-100 shadow-sm">
  <div class="card-body p-4">
    <div class="flex items-center justify-between gap-2">
      <div class="flex items-center gap-2 min-w-0">
        <span class="status-dot status-{{ card.status }}" aria-label="{{ status_labels.get(card.status, card.status) }}"></span>
        <h3 class="font-semibold truncate">{{ card.name }}</h3>
      </div>
      <span class="badge badge-ghost badge-sm whitespace-nowrap">{{ card.kind }}</span>
    </div>
    <div class="text-sm text-base-content/70 mt-1 break-words">{{ card.detail }}</div>
    {% if card.last_seen %}
    <div class="text-xs text-base-content/50 mt-1">last seen {{ card.last_seen }}</div>
    {% endif %}
  </div>
</div>
{% endfor %}
