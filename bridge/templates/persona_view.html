<h3 class="text-lg font-semibold mb-1">Persona</h3>
<div class="text-xs text-base-content/50 font-mono mb-2">{{ name }}.md</div>
{% if error %}
<div class="alert alert-error py-2 text-sm">{{ error }}</div>
{% else %}
<pre class="text-xs whitespace-pre-wrap break-words bg-base-200 p-3 rounded max-h-[60vh] overflow-y-auto">{{ content }}</pre>
{% if truncated %}
<div class="text-xs text-warning mt-1">— truncated at 50k chars —</div>
{% endif %}
{% endif %}
