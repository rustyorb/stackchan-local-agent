{% if ok %}
<div class="alert alert-success dotty-alert">
  <div>
    <div class="text-xs text-base-content/60">you said</div>
    <div class="break-words">{{ sent }}</div>
    <div class="text-xs text-base-content/60 mt-2">Dotty replied</div>
    <div class="break-words whitespace-pre-wrap">{{ response }}</div>
  </div>
</div>
{% else %}
<div class="alert alert-warning dotty-alert">{{ error }}</div>
{% endif %}
