<div class="card-body p-3">
  {% if have_photo %}
  <div class="flex gap-3 items-start">
    <img src="data:image/jpeg;base64,{{ thumbnail_b64 }}"
         alt="Latest capture" loading="lazy"
         class="w-32 h-32 sm:w-40 sm:h-40 rounded-lg object-cover bg-base-300 flex-shrink-0">
    <div class="min-w-0 flex-1">
      <div class="text-xs text-base-content/50 mb-1">{{ age }} ago{% if question %} &middot; "{{ question }}"{% endif %}</div>
      <div class="text-sm break-words whitespace-pre-wrap">{{ description }}</div>
    </div>
  </div>
  {% else %}
  <div class="flex flex-col items-center text-center py-3 px-2 gap-2">
    <svg class="w-20 h-20 opacity-50" aria-hidden="true"><use href="#dotty-hero"/></svg>
    <div class="text-xs text-base-content/50">No recent photo</div>
    <form hx-post="/ui/actions/say" hx-target="#vision-action-result" hx-swap="innerHTML"
          hx-disabled-elt="find button"
          class="mt-1 inline-block">
      <input type="hidden" name="text" value="take a photo">
      <button type="submit" class="btn btn-primary btn-sm">📸 Take a photo</button>
    </form>
    <div id="vision-action-result" class="mt-2 empty:hidden text-left"></div>
  </div>
  {% endif %}
</div>
