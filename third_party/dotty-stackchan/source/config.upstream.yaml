server:
  ip: 0.0.0.0
  port: 8000
  http_port: 8003
  websocket: ws://<UNRAID_IP>:8000/xiaozhi/v1/
  vision_explain: http://<RPI_IP>:8080/api/vision/explain
  timezone_offset: +10

log:
  log_level: INFO

delete_audio: true

selected_module:
  VAD: SileroVAD
  ASR: FunASR
  # ASR: WhisperLocal     # <-- uncomment to swap from FunASR (kid-speech win)
  LLM: ZeroClawLLM
  # LLM: OpenAICompat      # <-- switch to direct OpenAI-compatible LLM
  TTS: LocalPiper
  Memory: nomem
  Intent: nointent

# EDIT: tailor this persona prompt to your own context.
# Replace "Dotty" with whatever you want the robot to call itself.
# The hardware is a StackChan; the persona can be anything.
prompt: |
  You are Dotty, a small desktop robot assistant built on StackChan hardware.
  You speak through a small speaker with a cartoon face that shows your expression.
  Stay cheerful, curious, and helpful.

  Critical output rules:
  - ALWAYS begin your reply with exactly one emoji that conveys your emotion. The hardware parses it as a facial expression.
    Use these: 😊 smile, 😆 laugh, 😢 sad, 😮 surprise, 🤔 thinking, 😠 angry, 😐 neutral, 😍 love, 😴 sleepy.
  - Keep replies short and TTS-friendly: complete sentences, no lists, no markdown, no code blocks.
  - Prefer 1-3 short sentences. Never use stage directions or narration.
  - If you don't know, say so briefly and move on. If a question is ambiguous, ask one short clarifying question.

  Voice and persona:
  - Warm, competent, a little bit playful.
  - Your brain runs on ZeroClaw on the Raspberry Pi; voice I/O runs on xiaozhi-server on Unraid.

VAD:
  SileroVAD:
    type: silero
    threshold: 0.5
    threshold_low: 0.3
    model_dir: models/snakers4_silero-vad
    min_silence_duration_ms: 700

ASR:
  FunASR:
    type: fun_local
    model_dir: models/SenseVoiceSmall
    output_dir: tmp/
    # SenseVoiceSmall on "auto" mis-detects Korean/Japanese on short or unclear
    # English audio. Valid values: auto, zh, en, yue (Cantonese), ja, ko, nospeech.
    # Requires the patched fun_local.py mounted via docker-compose.yml.
    language: en
  WhisperLocal:
    type: whisper_local
    # On-disk CTranslate2 model dir (downloaded by `make fetch-models`).
    model_dir: models/whisper-small.en-ct2
    output_dir: tmp/
    # small.en is English-only — keep "en". For multilingual, use a non-.en
    # checkpoint and set "auto" or a specific code.
    language: en
    # Fallback model id when model_dir is empty (faster-whisper auto-fetch).
    model_size: small.en
    # Phase 1 = CPU-only. For Phase 2 (when GPUs are available) flip
    # device: cuda + compute_type: float16 — no Python changes needed.
    device: cpu
    compute_type: int8
    beam_size: 1
    cpu_threads: 0
    # Optional decoder bias — short list of canonical phrases improves
    # recall on rare names. Keep under ~200 chars to avoid prompt bleed.
    initial_prompt: null

TTS:
  EdgeTTS:
    type: edge
    voice: en-AU-WilliamNeural
    output_dir: tmp/
  StreamingEdgeTTS:
    type: edge_stream
    voice: en-AU-WilliamNeural
    output_dir: tmp/
  LocalPiper:
    type: piper_local
    voice: en_GB-cori-medium
    model_path: /opt/xiaozhi-esp32-server/models/piper/en_GB-cori-medium.onnx
    config_path: /opt/xiaozhi-esp32-server/models/piper/en_GB-cori-medium.onnx.json
    output_dir: tmp/

LLM:
  ZeroClawLLM:
    type: zeroclaw
    url: http://<RPI_IP>:8080/api/message/stream
    channel: dotty
    timeout: 90
    system_prompt: |
      You are <ROBOT_NAME>, a desktop robot (StackChan body). Begin every reply with a single emoji, then speak naturally in 1-3 short TTS-friendly sentences.

  # Generic OpenAI-compatible provider — works with OpenAI, OpenRouter,
  # Ollama (http://host:11434/v1), LM Studio, vLLM, etc.
  OpenAICompat:
    type: openai_compat
    # Base URL for the API (must end at /v1 — the provider appends /chat/completions).
    # Examples:
    #   OpenAI:      https://api.openai.com/v1
    #   OpenRouter:  https://openrouter.ai/api/v1
    #   Ollama:      http://localhost:11434/v1
    #   LM Studio:   http://localhost:1234/v1
    #   vLLM:        http://localhost:8000/v1
    url: <OPENAI_COMPAT_URL>
    api_key: <OPENAI_COMPAT_API_KEY>
    model: <OPENAI_COMPAT_MODEL>
    # Path to a persona markdown file loaded as the system prompt.
    # Relative paths resolve from the xiaozhi-server working directory
    # inside the container (/opt/xiaozhi-esp32-server).
    persona_file: personas/default.md
    max_tokens: 256
    temperature: 0.7
    timeout: 60
